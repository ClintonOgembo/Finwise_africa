<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — FinWise Africa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0D1B2A; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 0; }
        .auth-card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 24px 64px rgba(0,0,0,0.3); }
        .brand h2 { font-weight: 800; font-size: 1.8rem; color: #0D1B2A; margin: 0; }
        .brand h2 span { color: #00A86B; }
        .form-control, .form-select { border-radius: 10px; border: 1.5px solid #E0EBE5; padding: 11px 14px; }
        .form-control:focus, .form-select:focus { border-color: #00A86B; box-shadow: 0 0 0 3px rgba(0,168,107,0.15); }
        .form-label { font-weight: 600; font-size: 0.85rem; }
        .btn-primary { background: #00A86B; border: none; border-radius: 10px; padding: 12px; font-weight: 700; }
        .btn-primary:hover { background: #007A4D; }
        .alert { border: none; border-radius: 10px; font-size: 0.88rem; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="brand mb-4">
        <h2>Fin<span>Wise</span> Africa</h2>
        <p class="text-muted" style="font-size:0.85rem">Create your free account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="full_name" class="form-control" placeholder="John Kamau" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Currency</label>
            <select name="currency" class="form-select">
                <option value="KES">KES — Kenyan Shilling</option>
                <option value="UGX">UGX — Ugandan Shilling</option>
                <option value="TZS">TZS — Tanzanian Shilling</option>
                <option value="GHS">GHS — Ghanaian Cedi</option>
                <option value="NGN">NGN — Nigerian Naira</option>
                <option value="ZAR">ZAR — South African Rand</option>
                <option value="USD">USD — US Dollar</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>

    <p class="text-center mt-4" style="font-size:0.85rem;color:#6B7E75">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-success fw-600">Sign in</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
